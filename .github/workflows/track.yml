name: Track Hot Skills on X

on:
  schedule:
    # Hourly during Asia + US peak windows for maximum coverage
    - cron: '0 1-9 * * *'   # 01:00-09:00 UTC (09:00-17:00 GMT+8) — Asia peak
    - cron: '0 14-22 * * *'  # 14:00-22:00 UTC (10:00-18:00 US East) — US peak
  workflow_dispatch: # manual trigger

permissions:
  contents: write
  issues: write

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install bird CLI
        run: npm install -g @steipete/bird

      - name: Auth health check
        env:
          BIRD_AUTH_TOKEN: ${{ secrets.BIRD_AUTH_TOKEN }}
          BIRD_CT0: ${{ secrets.BIRD_CT0 }}
        run: |
          # Quick search to verify credentials still work
          RESULT=$(bird search "test" --count 1 --json --plain \
            --auth-token "$BIRD_AUTH_TOKEN" --ct0 "$BIRD_CT0" 2>&1) || true
          if echo "$RESULT" | grep -qi "credentials\|unauthorized\|forbidden\|Missing.*auth\|Missing.*ct0\|login"; then
            echo "::error::Twitter credentials expired or invalid"
            echo "AUTH_FAILED=true" >> "$GITHUB_ENV"
          else
            echo "Auth OK"
            echo "AUTH_FAILED=false" >> "$GITHUB_ENV"
          fi

      - name: Alert on auth failure
        if: env.AUTH_FAILED == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const title = '🔑 Twitter credentials expired';
            // Check if an open issue already exists to avoid spam
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'auth-expired',
            });
            if (issues.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body: [
                  'The `bird` CLI failed to authenticate with Twitter.',
                  '',
                  '**How to fix:**',
                  '1. Open x.com in Chrome, make sure you are logged in',
                  '2. DevTools → Application → Cookies → `https://x.com`',
                  '3. Copy `auth_token` and `ct0` values',
                  '4. Update repo secrets: Settings → Secrets → Actions',
                  '   - `BIRD_AUTH_TOKEN` → paste auth_token',
                  '   - `BIRD_CT0` → paste ct0',
                  '5. Close this issue',
                  '',
                  `Failed at: ${new Date().toISOString()}`,
                ].join('\n'),
                labels: ['auth-expired'],
              });
            }

      - name: Run tracking script
        if: env.AUTH_FAILED != 'true'
        env:
          BIRD_AUTH_TOKEN: ${{ secrets.BIRD_AUTH_TOKEN }}
          BIRD_CT0: ${{ secrets.BIRD_CT0 }}
        run: |
          ./track.sh
          ./hot24h.sh

      - name: Sync data to Pages
        if: env.AUTH_FAILED != 'true'
        run: |
          mkdir -p docs/data
          # Copy displayable data files (exclude raw/ and state files)
          for f in data/*-*.json; do
            [ -f "$f" ] && cp "$f" docs/data/
          done

      - name: Commit results
        if: env.AUTH_FAILED != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "track: $(date -u +%Y-%m-%dT%H:%M)Z skill trends update"
            git push
          fi
